name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shors-algorithm-simulation/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify release tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          expected_tags = {version, f"v{version}"}
          if tag not in expected_tags:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject version {version!r}. "
                  f"Expected one of: {', '.join(sorted(expected_tags))}"
              )
          PY

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/shors-wheel
          /tmp/shors-wheel/bin/python -m pip install --upgrade pip
          /tmp/shors-wheel/bin/python -m pip install dist/*.whl
          /tmp/shors-wheel/bin/shors-sim --N 15 --a 2 --json

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
